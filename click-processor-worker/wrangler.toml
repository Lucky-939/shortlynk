name = "click-processor-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = []

[dev]
port = 8789

# ── KV Bindings ───────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "c19cebc7bd0b4360aabe425be706b4e3"

# ── Queue Consumer ────────────────────────────────────────────────────────────
[[queues.consumers]]
queue = "click-events"
max_batch_size = 100
max_batch_timeout = 5
dead_letter_queue = "click-events-dlq"
