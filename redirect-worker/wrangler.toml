name = "redirect-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = []

[dev]
port = 8788

# ── KV Bindings ───────────────────────────────────────────────────────────────
# URLS_KV: read-only by convention — only shorten-worker writes to it.
[[kv_namespaces]]
binding = "URLS_KV"
id = "f6652bfca0194e119f8d8a95e3f6fd03"

# ── Queue Producer ────────────────────────────────────────────────────────────
[[queues.producers]]
binding = "CLICK_QUEUE"
queue = "click-events"
